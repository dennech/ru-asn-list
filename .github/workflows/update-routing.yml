name: Update Routing Artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * *"

concurrency:
  group: update-routing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate artifacts
        run: python3 tools/generate_routing.py

      - name: Validate artifacts
        run: python3 tools/generate_routing.py --check

      - name: Commit and push when needed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add routing.conf routing.meta.json rules/direct.list rules/proxy.list
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update routing artifacts"
          git push
